# Project name fixes the Docker network to "ats_default",
# which vehicle-orchestrator uses when creating per-vehicle containers.
name: ats

services:
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream"]

  ats-env:
    build:
      context: ./ats-env
    environment:
      NATS_URL: nats://nats:4222
    volumes:
      # Shared maps directory: viz-gateway saves uploaded maps here,
      # ats-env reads them from /maps/{filename}
      - maps_data:/maps
    depends_on:
      - nats
    restart: unless-stopped

  viz-gateway:
    build:
      context: .
      dockerfile: viz-gateway/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      WS_PORT: "8090"
      MAPS_DIR: /maps
    volumes:
      - maps_data:/maps
    ports:
      - "8090:8090"
    depends_on:
      - nats
    restart: unless-stopped

  vehicle-orchestrator:
    build:
      context: ./vehicle-orchestrator
    environment:
      NATS_URL: nats://nats:4222
      ORCHESTRATION_MODE: docker
      VEHICLE_IMAGE: vehicle-agent:latest
      VEHICLE_NETWORK: ats_default
    volumes:
      # Mount the Docker socket so the orchestrator can manage containers
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - nats
    restart: unless-stopped

  # vehicle-agent image builder — not started automatically.
  # Defining it here ensures `docker compose build` tags it as vehicle-agent:latest
  # so the orchestrator can find it when creating per-vehicle containers.
  vehicle-agent:
    build:
      context: ./vehicle-agent
    image: vehicle-agent:latest
    profiles:
      - build   # only starts with: docker compose --profile build up vehicle-agent

volumes:
  maps_data:
    driver: local
